version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asset-rental-postgres
    environment:
      POSTGRES_DB: asset_rental_db
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: asset_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
