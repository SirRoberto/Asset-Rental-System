version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asset-rental-postgres
    environment:
      POSTGRES_DB: asset_rental_db
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: asset_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: asset-rental-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
